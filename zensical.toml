[project]
site_name        = "Lightpanda Browser"
site_url         = "https://atharkharal.github.io/browser/"
site_description = "Developer documentation for Lightpanda — the headless browser built for AI agents, automation, and scraping."
site_author      = "Athar Kharal, PhD"
copyright        = "&copy; 2025 <a href=\"https://www.linkedin.com/in/atharkharal/\" target=\"_blank\" style=\"color: var(--md-typeset-a-color); text-decoration: underline;\">Athar Kharal, PhD</a> | Lightpanda (Selecy SAS)"
repo_url         = "https://github.com/lightpanda-io/browser"
repo_name        = "lightpanda-io/browser"
edit_uri          = "edit/main/docs/"
extra_javascript = ["assets/custom.js"]
extra_css        = ["assets/custom.css"]

nav = [
  {"Home" = "index.md"},
  {"Tutorials" = [
      {"Quick Start" = "tutorials/getting-started.md"},
      {"Puppeteer Integration" = "tutorials/puppeteer-walkthrough.md"},
      {"Playwright Integration" = "tutorials/playwright-walkthrough.md"}
  ]},
  {"How-To Guides" = [
      {"Build from Source" = "how-to/build-from-source.md"},
      {"Docker Deployment" = "how-to/docker-deployment.md"},
      {"Network Interception" = "how-to/network-interception.md"},
      {"Proxy Configuration" = "how-to/proxy-configuration.md"},
      {"Disable Telemetry" = "how-to/disable-telemetry.md"}
  ]},
  {"Reference" = [
      {"Architecture" = "reference/architecture.md"},
      {"CLI Reference" = "reference/cli-reference.md"},
      {"CDP Protocol" = "reference/cdp-protocol.md"},
      {"Web API Coverage" = "reference/web-api-coverage.md"},
      {"Operations" = "reference/operations.md"},
      {"Performance" = "reference/performance.md"}
  ]},
  {"Explanation" = [
      {"Design Philosophy" = "explanation/design-philosophy.md"},
      {"JavaScript Engine" = "explanation/javascript-engine.md"},
      {"Memory Architecture" = "explanation/memory-architecture.md"}
  ]}
]

[project.theme]
variant = "modern"
logo = "assets/logo-lightpanda.png"
favicon = "assets/logo-lightpanda.png"
features = [
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.tracking",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.sections",
    "navigation.indexes",
    "navigation.path",
    "navigation.top",
    "toc.follow",
    "search.suggest",
    "search.highlight",
    "content.code.copy",
    "content.tabs.link",
]
palette = [
    {scheme = "slate", primary = "deep purple", accent = "cyan", toggle = {icon = "material/brightness-4", name = "Switch to light mode"}},
    {scheme = "default", primary = "deep purple", accent = "cyan", toggle = {icon = "material/brightness-7", name = "Switch to dark mode"}}
]

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[project.theme.analytics]
provider = "google"
property = "G-XXXXXXXXXX"

[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
  custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
  ]
[project.markdown_extensions.pymdownx.highlight]
  anchor_linenums = true
[project.markdown_extensions.pymdownx.tabbed]
  alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
  custom_checkbox = true
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.tables]
[project.markdown_extensions.toc]
  permalink = true
[project.markdown_extensions.abbr]
[project.markdown_extensions.md_in_html]

[project.plugins.search]
[project.plugins.tags]
[project.plugins.social]